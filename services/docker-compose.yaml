services:
  data-collector:
    build:
      context: ./data-collector
      dockerfile: Dockerfile
    volumes:
      - .:/data-collector/src:cached
      - /src/.venv
    ports:
      - "8000:8000"
    environment:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb
      DB_HOST: db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE: data-analyzer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://data-collector:8000/health"]
      interval: 10s
      timeout: 30s
      retries: 3
      start_period: 10s
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy

  data-analyzer:
    build:
      context: ./data-analyzer
      dockerfile: Dockerfile
    volumes:
      - .:/data-analyzer/src:cached
      - /src/.venv
    ports:
      - "80:80"
    environment:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb
      DB_HOST: db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE: data-analyzer
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      data-collector:
        condition: service_healthy

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - .:/streamlit/src:cached
      - /src/.venv
    environment:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb
      DB_HOST: db
      DATA_COLLECTOR_ENDPOINT: http://data-collector:8000/data
      DATA_ANALYZER_ENDPOINT: http://data-analyzer:80/analyze
    depends_on:
      data-collector:
        condition: service_healthy
  
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  flyway:
    build:
      context: ./flyway
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    depends_on:
      data-collector:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics --quiet check_running && rabbitmq-diagnostics --quiet check_local_alarms
      interval: 5s
      timeout: 30s
      retries: 3
      start_period: 10s

volumes:
  postgres-data: